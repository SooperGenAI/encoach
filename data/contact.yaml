        the most reliable route.
    image: /uploads/illustrations/cuate/ecosystem.svg
    points:
      - title: Email
        body: >
          hello@encoach.ai
      - title: LinkedIn
        body: >
          Encoach.ai on LinkedIn — linkedin.com/company/encoach-ai
      - title: Location
        body: >
          India

closing:
  eyebrow: What happens next
  headline: >
    A brief, focused conversation.
  paragraphs:
    - >
      We'll respond within two working days. Initial conversations are
      short and focused — we are at the stage where every conversation
      shapes how the platform develops.
  audience_line: >
    For students, institutes, and corporates — we'd like to hear from you.
  primary_cta:
    label: Email hello@encoach.ai
    url: "mailto:hello@encoach.ai"
