hero:
  eyebrow: Talk to us
  headline: >
    We work with students, institutions, and corporates.
  lead: >
    Tell us where you are coming from — student, training partner, or
    corporate finance function — and we'll take it from there.

sections:
  - eyebrow: How to reach us
    headline: >
      Email is the fastest way at this stage.
    body:
      - >
        A structured contact form will be published shortly. In the
