# ----------------------------------------------------------------------
# Encoach.ai — Homepage content (tightened)
# Prose cut by ~50%. One illustration anchors each section in addition
# to the existing functional schematics.
# ----------------------------------------------------------------------

hero:
  headline: >
    Preparing the workforce for AI-enabled accounting
    and finance operations.
  subhead: >
    Practical training and corporate internships for finance
    professionals entering AI-assisted, workflow-driven environments.
  primary_cta:
    label: Apply for cohort
    url: /contact/
  secondary_cta:
    label: Partner with Encoach.ai
    url: /contact/

# ----------------------------------------------------------------------
shift:
  eyebrow: The industry shift
  headline: >
    Finance operations are entering a new operational era.
  paragraphs:
    - >
      Spreadsheet coordination, manual reconciliation, and
      manpower-intensive administration are giving way to AI-assisted
      systems, workflow-driven processes, and Human + AI collaboration.
    - >
      Encoach.ai prepares finance professionals for this transition.

# ----------------------------------------------------------------------
model:
  eyebrow: The workforce gap
  headline: >
    Traditional finance education is no longer sufficient on its own.
  intro:
    - >
      Students graduate with strong fundamentals but limited exposure
      to AI-assisted workflows and operational finance systems.
      Encoach.ai bridges that gap through three operational capabilities.
  pillars:
    - title: AI familiarisation for finance
      body: >
        Working comfort with AI in an accounting and finance context —
        focused on operational use, not programming.
    - title: Operational workflow training
      body: >
        Hands-on exposure to reconciliation, supervision, and
        workflow-driven finance operations.
    - title: Structured corporate internships
      body: >
        Real operational placements inside finance functions —
        bridging classroom and operating reality.

# ----------------------------------------------------------------------
operating_model:
  eyebrow: The operating model
  headline: >
    Human + AI collaboration is the operating model for the next
    era of finance.
  paragraphs:
    - >
      AI handles monitoring, reconciliation, coordination, and anomaly
      detection. Humans handle judgement, governance, and certification.
    - >
      Encoach.ai students develop this collaborative fluency through
      hands-on exposure to Memintel-Canvas — an AI-enabled accounting
      administration platform.
  capabilities_label: Memintel-Canvas
  capabilities:
    - Workflow intelligence
    - Operational supervision
    - Reconciliation coordination
    - Workflow monitoring and escalations
    - Experts in the loop
  cta:
    label: Read about Memintel-Canvas
    url: /memintel-canvas/

# ----------------------------------------------------------------------
ecosystem:
  eyebrow: The ecosystem
  headline: >
    Connecting workforce development with real operational
    finance environments.
  intro: >
    Encoach.ai connects three constituencies — the people entering
    finance work, the institutions preparing them, and the
    organisations hiring them.
  entries:
    - label: I
      title: Students and trainees
      body: >
        CA students, commerce graduates, and finance trainees preparing
        for AI-enabled finance work.
    - label: II
      title: Finance training institutions
      body: >
        CA coaching institutes and academic partners modernising their
        offering with operational training.
    - label: III
      title: Corporate finance functions
      body: >
        Enterprises and shared services teams gaining a channel for
        AI-ready interns and modern workflow practice.
  closing_note: >
    Low-friction, operationally practical, enterprise-friendly.

# ----------------------------------------------------------------------
closing:
  eyebrow: The long view
  headline: >
    The workforce layer for AI-enabled finance operations.
  paragraphs:
    - >
      Encoach.ai is being built as the workforce layer for the
      operational future of finance — beginning with India's CA
      ecosystem and extending toward CPA, ACCA, and global finance
      workforce pathways.
  audience_line: >
    For students, training institutions, and corporate finance
    functions — we would like to hear from you.
  primary_cta:
    label: Talk to us
    url: /contact/
