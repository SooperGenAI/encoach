# ----------------------------------------------------------------------
shift:
  eyebrow: The industry shift
  headline: >
    Accounting and finance operations are entering a new operational era.
  paragraphs:
    - >
      Artificial intelligence is changing how businesses operate across
      industries. Accounting and finance — historically organised
      around spreadsheet coordination, manual reconciliation, repetitive
      workflows, and manpower-intensive administration — is now entering
      the same transition.
    - >
      Modern finance environments are moving toward AI-assisted
      operational systems, workflow-driven processes, and Human + AI
      collaboration. The professional entering this environment needs
      to understand operational workflows and modern finance
      infrastructure alongside the foundations of the profession.
    - >
      Encoach.ai was created to prepare students and finance
      professionals for this transition.

# ----------------------------------------------------------------------
model:
  eyebrow: The workforce gap
  headline: >
    Traditional finance education is no longer sufficient on its own.
  intro:
    - >
      Much of accounting and finance education today remains theoretical,
      examination-oriented, and disconnected from modern operational
      finance environments. Students graduate with strong conceptual
      depth but limited exposure to AI-assisted workflows, enterprise
      finance systems, workflow intelligence, or AI-enabled accounting
      administration.
    - >
      Enterprises increasingly require finance professionals who operate
      comfortably within workflow-driven environments, operational
      systems, and Human + AI accounting workflows. The gap between
      traditional education and operational reality is widening.
    - >
      Encoach.ai is designed to bridge that gap — through a practical
      model built around three operational capabilities.
  pillars:
    - title: AI familiarisation for finance professionals
      body: >
        Working comfort with AI in an accounting and finance context — not
        programming, not model building. The emphasis is on operational
        use: understanding AI-assisted workflows, Human + AI environments,
        workflow supervision, and the direction modern finance operations
        are moving.
    - title: Operational finance workflow training
      body: >
        Practical exposure to reconciliation environments, operational
        coordination, workflow supervision, accounting administration,
        compliance operations, and operational visibility. The training
        prioritises operational understanding over theory — students
        develop instincts for how finance work runs end-to-end.
    - title: Structured corporate internships
      body: >
        Real operational placements inside corporate finance functions.
        Trainees develop enterprise familiarity, workflow understanding,
        accounting administration practice, and exposure to modern
        finance environments — bridging classroom and operating reality.

# ----------------------------------------------------------------------
operating_model:
  eyebrow: The operating model
  headline: >
    Human + AI collaboration is the operating model for the next
    era of finance.
  paragraphs:
    - >
      AI systems are increasingly capable of monitoring,
      reconciliation, workflow coordination, anomaly identification,
      and operational supervision. Finance operations, however, still
      require judgement, governance, interpretation, accountability,
      and oversight.
    - >
      The future finance professional will collaborate with AI systems,
      supervise workflows, interpret operational signals, manage
      escalations, and operate within AI-assisted finance environments.
    - >
      At Encoach.ai, students develop this fluency through hands-on
      exposure to Memintel-Canvas — an AI-enabled accounting
      administration platform built around workflow intelligence,
      operational supervision, and Human + AI accounting operations.
  capabilities_label: Memintel-Canvas
  capabilities:
    - Workflow intelligence
    - Operational supervision
    - Reconciliation coordination
    - Workflow monitoring and escalations
    - Experts in the loop
  cta:
    label: Read about Memintel-Canvas
    url: /memintel-canvas/

# ----------------------------------------------------------------------
ecosystem:
  eyebrow: The ecosystem
  headline: >
    Connecting workforce development with real operational finance
    environments.
  intro: >
    Encoach.ai operates as a structured ecosystem connecting three
    constituencies — the people entering finance work, the institutions
    preparing them, and the organisations hiring them.
  entries:
    - label: I
      title: Students and trainees
      body: >
        CA students, commerce graduates, accounting professionals, and
        early-career finance trainees — preparing for the operational
        future of accounting and finance work through practical training,
        workflow exposure, and AI familiarity.
    - label: II
      title: Finance training institutions
      body: >
        CA coaching institutes and academic partners modernising their
        offering with future-ready operational training that complements
        the core curriculum and differentiates outcomes.
    - label: III
      title: Corporate finance functions
      body: >
        Enterprises and shared services teams gaining access to
        AI-aware finance interns, structured operational support, and a
        workforce channel into modern workflow-driven accounting
        environments.
  closing_note: >
    The model is built to remain low-friction, operationally practical,
    and enterprise-friendly.

# ----------------------------------------------------------------------
closing:
  eyebrow: The long view
  headline: >
    The workforce layer for AI-enabled finance operations.
  paragraphs:
    - >
      The accounting and finance industry is in the early stages of a
      substantial operational transformation. The future of finance work
      will involve AI-assisted workflows, operational intelligence,
      workflow-driven environments, continuous supervision, and
      Human + AI collaboration.
    - >
      Encoach.ai is being built as the workforce layer for that future.
      We begin with India's CA ecosystem, extend toward CPA and ACCA
      pathways, and orient over time toward AI-enabled finance
      operations delivered from India.
  audience_line: >
    For students, training institutions, and corporate finance functions —
    we would like to hear from you.
  primary_cta:
    label: Talk to us
    url: /contact/
