hero:
  eyebrow: Programs
  headline: >
    Operational training for the AI-enabled finance workforce.
  lead: >
    Practical training built around the four operational pillars of
    AI-enabled finance work, culminating in a structured corporate
    internship.
  image: /uploads/illustrations/cuate/learning.svg

sections:
  - eyebrow: The model
    headline: >
      Four pillars, one practical program.
    body:
      - >
        Each program develops the four capabilities that define
        operational readiness in modern finance environments.
    image: /uploads/illustrations/cuate/pathway.svg
    points:
      - title: AI familiarisation for non-technical finance
        body: >
          Working comfort with AI in an accounting and finance
          context — focused on operational use, not programming.
      - title: AI-assisted accounting administration
        body: >
          Practice with AI-enabled administration, review, exception
          handling, and certification within structured workflows.
      - title: Workflow-driven finance operations
        body: >
          Operating inside end-to-end finance workflows with their
          dependencies and supervisory rhythm.
      - title: Operational finance systems
        body: >
          Practical exposure to the systems modern finance functions
          are being rebuilt on — including Memintel-Canvas.

  - eyebrow: The internship
    headline: >
      An 8-week corporate internship, embedded with continued training.
    body:
      - >
        Every program runs as a 12-week internship-integrated arc — 4
        weeks of intensive training followed by 8 weeks inside a partner
        finance function, with parallel supplementary coursework
        throughout the placement.
    image: /uploads/illustrations/cuate/finance.svg

  - eyebrow: Who it's for
    headline: >
      Built for students, institutions, and corporates.
    body:
      - >
        Encoach.ai connects three constituencies — the people entering
        finance work, the institutions preparing them, and the
        organisations hiring them.
    image: /uploads/illustrations/cuate/ecosystem.svg

closing:
  eyebrow: Next step
  headline: >
    Apply for the upcoming cohort.
  paragraphs:
    - >
      Programs run on rolling cohorts. Get in touch to learn about
      schedules, scope, and partnership models.
  audience_line: >
    For students, institutions, and corporates — talk to us about
    fit, scope, and timing.
  primary_cta:
    label: Talk to us
    url: /contact/
