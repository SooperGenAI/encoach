hero:
  eyebrow: The Internship Model
  headline: >
    A real operational placement, not a shadowing exercise.
  lead: >
    Encoach.ai runs a 12-week internship-integrated program — 4 weeks
    of intensive training followed by 8 weeks of corporate internship,
    with parallel supplementary coursework throughout.

sections:
  - eyebrow: How it's structured
    headline: >
      A 12-week internship-integrated arc.
    body:
      - >
        Students become workplace-ready within 4 weeks and then continue
        learning while embedded inside real corporate finance operations.
      - >
        Intensive foundations and platform training compress operational
        fluency into the first month. Corporate placement begins in week 5
        and runs alongside continuing coursework — so trainees apply what
        they learn inside live finance functions rather than rehearsing it
        in a classroom.
    image: /uploads/illustrations/cuate/process.svg
    points:
      - title: Weeks 1 – 4 · Foundations & platform training
        body: >
          Intensive training in AI-enabled accounting operations, workflow
          systems, finance administration processes, and practical usage
          of Memintel-Canvas through guided exercises and supervised
          simulations.
      - title: Weeks 5 – 8 · Internship + applied learning
        body: >
          Students begin corporate internship placements while continuing
          structured supplementary coursework focused on workflow
          execution, exception handling, reporting, and operational
          coordination.
      - title: Weeks 9 – 12 · Advanced internship & operational fluency
        body: >
          Participants operate with increasing autonomy inside partner
          finance teams while attending parallel advanced sessions on
          AI-assisted accounting administration, workflow optimisation,
          and enterprise operating practices.

  - eyebrow: What corporates get
    headline: >
      An operationally ready intern, from day one.
    body:
      - >
        Trainees arrive at the corporate placement in week 5 already
        fluent in AI-enabled workflow operations. They take on real,
        supervised, accountable work for the eight weeks that follow.
    image: /uploads/illustrations/cuate/collaboration.svg

  - eyebrow: What trainees get
    headline: >
      A documented operational track record at the start of a career.
    body:
      - >
        Not exposure, not theory — a demonstrated operational record
        inside a real finance function, built through eight weeks of
        embedded placement alongside continuing coursework, with
        corporate evaluation that speaks to hiring teams.
    image: /uploads/illustrations/cuate/growth.svg

closing:
  eyebrow: Get involved
  headline: >
    Host an intern. Apply for a cohort.
  paragraphs:
    - >
      Corporate finance functions and shared services teams can host
      operationally ready interns through Encoach.ai's 12-week
      internship-integrated program.
  audience_line: >
    For corporates and trainees — get in touch.
  primary_cta:
    label: Talk to us
    url: /contact/
