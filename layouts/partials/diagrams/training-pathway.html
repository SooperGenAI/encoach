{{/*
  Training pathway — §3 Model
  Three-milestone visual journey: AI familiarisation → workflow training → internships.
  Each milestone is a labelled hexagonal node with an iconic symbol.
  Connected by a curved path suggesting progression.
  Renders on the light canvas surface.
*/}}
<div class="dgm relative">
  <svg viewBox="0 0 720 320" class="w-full h-auto" preserveAspectRatio="xMidYMid meet" aria-hidden="true">

    {{/* Background path — gentle arc connecting the three milestones */}}
    <path d="M 100 200 Q 360 60 620 200"
          stroke="#54a0a1" stroke-width="1" stroke-dasharray="3 4" fill="none" opacity="0.4"/>

    {{/* Milestone 1 — AI familiarisation */}}
    <g>
      <circle cx="100" cy="200" r="48" fill="#eff7f7" stroke="#7fbcbc" stroke-width="1.5"/>
      {{/* Brain/neuron motif: a small grid with connectors */}}
      <g transform="translate(100 200)">
        <circle cx="-12" cy="-8" r="2.5" fill="#3d8688"/>
        <circle cx="12" cy="-8" r="2.5" fill="#3d8688"/>
        <circle cx="0" cy="2" r="2.5" fill="#3d8688"/>
        <circle cx="-12" cy="12" r="2.5" fill="#3d8688"/>
        <circle cx="12" cy="12" r="2.5" fill="#3d8688"/>
        <line x1="-12" y1="-8" x2="0" y2="2" stroke="#3d8688" stroke-width="0.75"/>
        <line x1="12" y1="-8" x2="0" y2="2" stroke="#3d8688" stroke-width="0.75"/>
        <line x1="0" y1="2" x2="-12" y2="12" stroke="#3d8688" stroke-width="0.75"/>
        <line x1="0" y1="2" x2="12" y2="12" stroke="#3d8688" stroke-width="0.75"/>
      </g>
      <text x="100" y="270" text-anchor="middle" fill="#0a1628" font-family="Inter, sans-serif" font-size="13" font-weight="500">AI familiarisation</text>
      <text x="100" y="288" text-anchor="middle" fill="#525968" font-family="Inter, sans-serif" font-size="11">Operational fluency</text>
      <text x="100" y="148" text-anchor="middle" fill="#3d8688" font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.05em">01</text>
    </g>

    {{/* Milestone 2 — Workflow training */}}
    <g>
      <circle cx="360" cy="100" r="48" fill="#eff7f7" stroke="#7fbcbc" stroke-width="1.5"/>
      {{/* Workflow motif: stepped horizontal bars */}}
      <g transform="translate(360 100)">
        <rect x="-16" y="-12" width="20" height="4" fill="#3d8688" rx="0.5"/>
        <rect x="-8" y="-4" width="24" height="4" fill="#3d8688" rx="0.5"/>
        <rect x="-4" y="4" width="20" height="4" fill="#3d8688" rx="0.5"/>
        <line x1="-16" y1="-10" x2="-16" y2="14" stroke="#3d8688" stroke-width="0.75"/>
        <line x1="16" y1="-10" x2="16" y2="14" stroke="#3d8688" stroke-width="0.75"/>
      </g>
      <text x="360" y="170" text-anchor="middle" fill="#0a1628" font-family="Inter, sans-serif" font-size="13" font-weight="500">Workflow training</text>
      <text x="360" y="188" text-anchor="middle" fill="#525968" font-family="Inter, sans-serif" font-size="11">Operational practice</text>
      <text x="360" y="48" text-anchor="middle" fill="#3d8688" font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.05em">02</text>
    </g>

    {{/* Milestone 3 — Corporate internships */}}
    <g>
      <circle cx="620" cy="200" r="48" fill="#eff7f7" stroke="#7fbcbc" stroke-width="1.5"/>
      {{/* Building/enterprise motif */}}
      <g transform="translate(620 200)">
        <rect x="-14" y="-12" width="28" height="22" fill="none" stroke="#3d8688" stroke-width="1.25"/>
        <line x1="-14" y1="-2" x2="14" y2="-2" stroke="#3d8688" stroke-width="0.75"/>
        <line x1="-7" y1="-12" x2="-7" y2="10" stroke="#3d8688" stroke-width="0.75"/>
        <line x1="0" y1="-12" x2="0" y2="10" stroke="#3d8688" stroke-width="0.75"/>
        <line x1="7" y1="-12" x2="7" y2="10" stroke="#3d8688" stroke-width="0.75"/>
        <circle cx="0" cy="14" r="1.5" fill="#3d8688"/>
      </g>
      <text x="620" y="270" text-anchor="middle" fill="#0a1628" font-family="Inter, sans-serif" font-size="13" font-weight="500">Corporate internships</text>
      <text x="620" y="288" text-anchor="middle" fill="#525968" font-family="Inter, sans-serif" font-size="11">Operational readiness</text>
      <text x="620" y="148" text-anchor="middle" fill="#3d8688" font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.05em">03</text>
    </g>

    {{/* Start / end markers (subtle) */}}
    <circle cx="30" cy="270" r="2" fill="#94a3b8"/>
    <text x="30" y="298" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="10" font-style="italic">Student</text>

    <circle cx="690" cy="270" r="2" fill="#3d8688"/>
    <text x="690" y="298" text-anchor="middle" fill="#3d8688" font-family="Inter, sans-serif" font-size="10" font-style="italic">Operationally ready</text>

  </svg>
</div>
