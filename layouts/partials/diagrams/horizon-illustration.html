{{/*
  Horizon illustration — §6 Closing
  Expanding-scope visualisation: India CA → CPA & ACCA → global finance workforce.
  Concentric arcs that widen outward, with labels at three milestones.
  Renders on the dark slate-800 closing surface.
*/}}
<div class="dgm relative">
  <svg viewBox="0 0 720 360" class="w-full h-auto" preserveAspectRatio="xMidYMid meet" aria-hidden="true">

    {{/* Center origin point (Encoach.ai) */}}
    <circle cx="360" cy="320" r="3" fill="#7fbcbc"/>
    <text x="360" y="345" text-anchor="middle" fill="#7fbcbc" font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.08em">ENCOACH.AI</text>

    {{/* Arc 1 — India CA (inner) */}}
    <path d="M 200 320 A 160 160 0 0 1 520 320"
          stroke="#54a0a1" stroke-width="1.25" fill="none" opacity="0.95"/>
    <text x="240" y="200" text-anchor="middle" fill="#fafaf7" font-family="Inter, sans-serif" font-size="12" font-weight="500">India CA ecosystem</text>
    <text x="240" y="218" text-anchor="middle" fill="#c2c8d3" font-family="Inter, sans-serif" font-size="11">Today</text>
    {{/* Milestone dot */}}
    <circle cx="200" cy="320" r="3" fill="#54a0a1"/>
    <circle cx="520" cy="320" r="3" fill="#54a0a1"/>

    {{/* Arc 2 — CPA & ACCA (middle) */}}
    <path d="M 120 320 A 240 240 0 0 1 600 320"
          stroke="#54a0a1" stroke-width="1" stroke-dasharray="4 5" fill="none" opacity="0.7"/>
    <text x="600" y="148" text-anchor="middle" fill="#fafaf7" font-family="Inter, sans-serif" font-size="12" font-weight="500">CPA &amp; ACCA pathways</text>
    <text x="600" y="166" text-anchor="middle" fill="#c2c8d3" font-family="Inter, sans-serif" font-size="11">Next horizon</text>
    {{/* Milestone dots */}}
    <circle cx="120" cy="320" r="3" fill="#54a0a1" opacity="0.7"/>
    <circle cx="600" cy="320" r="3" fill="#54a0a1" opacity="0.7"/>

    {{/* Arc 3 — Global (outer) */}}
    <path d="M 40 320 A 320 320 0 0 1 680 320"
          stroke="#54a0a1" stroke-width="0.75" stroke-dasharray="2 6" fill="none" opacity="0.5"/>
    <text x="360" y="60" text-anchor="middle" fill="#fafaf7" font-family="Inter, sans-serif" font-size="12" font-weight="500">Global finance workforce</text>
    <text x="360" y="78" text-anchor="middle" fill="#c2c8d3" font-family="Inter, sans-serif" font-size="11" font-style="italic">Long horizon</text>
    {{/* Milestone dots */}}
    <circle cx="40" cy="320" r="3" fill="#54a0a1" opacity="0.5"/>
    <circle cx="680" cy="320" r="3" fill="#54a0a1" opacity="0.5"/>

    {{/* Vertical center indicator (radial line from origin to top arc) */}}
    <line x1="360" y1="320" x2="360" y2="115" stroke="#54a0a1" stroke-width="0.5" opacity="0.35" stroke-dasharray="2 4"/>

  </svg>
</div>
