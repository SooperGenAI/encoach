{{- $d := .data -}}
<section class="bg-canvas">
  <div class="container-default py-24 md:py-32 lg:py-40">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-y-12 lg:gap-x-16 lg:items-center">

      {{/* Image RIGHT */}}
      <div class="lg:col-span-5 lg:order-last">
        <img src="{{ "/uploads/illustrations/cuate/ecosystem.svg" | relURL }}" alt="" class="w-full h-auto" loading="lazy"/>
      </div>

      {{/* Content LEFT — title with intro directly below */}}
      <div class="lg:col-span-7">
        {{ with $d.eyebrow }}
        <p class="text-2xs font-medium uppercase tracking-[0.2em] text-slate-500">{{ . }}</p>
        {{ end }}
        <h2 class="mt-4 font-display text-ink font-normal leading-[1.1] tracking-[-0.02em]
                   text-3xl sm:text-4xl md:text-5xl">
          {{ $d.headline | chomp | strings.TrimSuffix "." }}
        </h2>
        {{ with $d.intro }}
        <p class="mt-6 text-base md:text-lg leading-relaxed text-slate-700 max-w-prose">{{ . }}</p>
        {{ end }}
      </div>

    </div>

    {{ with $d.closing_note }}
    <p class="mt-14 max-w-2xl text-sm md:text-base leading-relaxed text-slate-500 italic">
      {{ . }}
    </p>
    {{ end }}
  </div>
</section>
