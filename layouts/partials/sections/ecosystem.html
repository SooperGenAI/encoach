{{- $d := .data -}}
<section class="bg-paper">
  <div class="container-default py-24 md:py-32 lg:py-40">

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-y-10 lg:gap-x-16">
      <div class="lg:col-span-5">
        {{ with $d.eyebrow }}
        <p class="text-2xs font-medium uppercase tracking-[0.2em] text-slate-500">{{ . }}</p>
        {{ end }}
        <h2 class="mt-5 font-display text-ink font-normal leading-[1.1] tracking-[-0.02em]
                   text-3xl sm:text-4xl md:text-5xl">
          {{ $d.headline }}
        </h2>
      </div>
      <div class="lg:col-span-7 lg:pt-3">
        {{ with $d.intro }}
        <p class="max-w-2xl text-base md:text-lg leading-relaxed text-slate-700">{{ . }}</p>
        {{ end }}
      </div>
    </div>

    {{ with $d.entries }}
    <div class="mt-20 md:mt-24 border-t border-hairline">
      {{ range $i, $e := . }}
      <div class="grid grid-cols-12 gap-x-6 lg:gap-x-10 py-10 md:py-14 border-b border-hairline last:border-b-0">
        <div class="col-span-12 md:col-span-4 lg:col-span-3">
          <p class="font-mono text-xs text-slate-500 tracking-[0.08em]">{{ $e.label }}</p>
          <h3 class="mt-3 font-display text-ink font-normal leading-tight text-xl md:text-2xl">
            {{ $e.title }}
          </h3>
        </div>
        <div class="col-span-12 md:col-span-8 lg:col-span-8 lg:col-start-5 md:pt-1">
          <p class="text-base md:text-lg leading-relaxed text-slate-700 max-w-2xl">{{ $e.body }}</p>
        </div>
      </div>
      {{ end }}
    </div>
    {{ end }}

    {{ with $d.closing_note }}
    <p class="mt-12 max-w-2xl text-sm md:text-base leading-relaxed text-slate-500 italic">
      {{ . }}
    </p>
    {{ end }}
  </div>
</section>
