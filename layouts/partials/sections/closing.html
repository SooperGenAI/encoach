{{- $d := .data -}}
<section class="bg-slate-800 text-slate-300">
  <div class="container-default py-24 md:py-32 lg:py-40">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-y-12 lg:gap-x-16">

      <div class="lg:col-span-5">
        {{ with $d.eyebrow }}
        <p class="text-2xs font-medium uppercase tracking-[0.2em] text-slate-400">{{ . }}</p>
        {{ end }}
        <h2 class="mt-5 font-display text-canvas font-normal leading-[1.1] tracking-[-0.02em]
                   text-3xl sm:text-4xl md:text-5xl max-w-xl">
          {{ $d.headline }}
        </h2>
      </div>

      <div class="lg:col-span-7 lg:pt-3">
        <div class="max-w-2xl space-y-6 text-base md:text-lg leading-relaxed text-slate-300">
          {{ range $d.paragraphs }}
            <p>{{ . }}</p>
          {{ end }}
        </div>

        {{ with $d.audience_line }}
        <p class="mt-14 max-w-2xl text-base text-slate-400">{{ . }}</p>
        {{ end }}

        {{ with $d.primary_cta }}
        <div class="mt-6">
          <a href="{{ .url | relURL }}" class="btn btn-light">
            {{ .label }}
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
        {{ end }}
      </div>
    </div>
  </div>
</section>
