{{- $d := .data -}}
<section class="bg-slate-800 text-slate-300">
  <div class="container-default py-24 md:py-32 lg:py-40">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-y-10 lg:gap-x-16">
      <div class="lg:col-span-5">
        {{ with $d.eyebrow }}
        <p class="text-2xs font-medium uppercase tracking-[0.2em] text-slate-400">{{ . }}</p>
        {{ end }}
        <h2 class="mt-5 font-display text-canvas font-normal leading-[1.1] tracking-[-0.02em]
                   text-3xl sm:text-4xl md:text-5xl">
          {{ $d.headline }}
        </h2>
      </div>

      <div class="lg:col-span-7 lg:pt-3">
        <div class="max-w-2xl space-y-6 text-base md:text-lg leading-relaxed text-slate-300">
          {{ range $d.paragraphs }}
            <p>{{ . }}</p>
          {{ end }}
        </div>
      </div>
    </div>

    {{/* Shift schematic — visual close of the section argument */}}
    <div class="mt-20 md:mt-28 lg:mt-32 max-w-4xl mx-auto">
      {{ partial "diagrams/shift-schematic.html" . }}
    </div>
  </div>
</section>
