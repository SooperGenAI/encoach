<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- background decorative shapes -->
  <circle cx="68" cy="74" r="38" fill="#eff7f7"/>
  <circle cx="420" cy="280" r="28" fill="#dee5ee"/>
  <rect x="376" y="56" width="44" height="44" rx="6" fill="#eff7f7" transform="rotate(15 398 78)"/>
  <circle cx="56" cy="280" r="5" fill="#3d8688"/>
  <circle cx="42" cy="300" r="3" fill="#3d8688"/>
  <circle cx="432" cy="160" r="4" fill="#7fbcbc"/>
  <circle cx="448" cy="180" r="3" fill="#7fbcbc"/>

  <!-- floor line -->
  <line x1="40" y1="324" x2="440" y2="324" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- desk -->
  <rect x="120" y="284" width="240" height="6" rx="2" fill="#3d8688"/>
  <line x1="142" y1="290" x2="142" y2="322" stroke="#3d8688" stroke-width="3" stroke-linecap="round"/>
  <line x1="338" y1="290" x2="338" y2="322" stroke="#3d8688" stroke-width="3" stroke-linecap="round"/>

  <!-- laptop -->
  <g>
    <rect x="198" y="248" width="84" height="40" rx="4" fill="#0a1628"/>
    <rect x="202" y="252" width="76" height="32" rx="2" fill="#7fbcbc"/>
    <polyline points="208,272 224,260 240,266 256,256 274,262" stroke="#fafaf7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="186" y="286" width="108" height="5" rx="1.5" fill="#0a1628"/>
  </g>

  <!-- person sitting -->
  <g>
    <rect x="206" y="180" width="68" height="44" rx="8" fill="#486a8b"/>
    <rect x="220" y="192" width="40" height="62" rx="6" fill="#3d8688"/>
    <circle cx="240" cy="174" r="20" fill="#f4d2a4"/>
    <path d="M220 170 Q240 152 260 170 L260 180 Q240 162 220 180 Z" fill="#1a2738"/>
    <circle cx="234" cy="176" r="1.5" fill="#0a1628"/>
    <circle cx="246" cy="176" r="1.5" fill="#0a1628"/>
    <path d="M235 184 Q240 187 245 184" stroke="#0a1628" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <path d="M220 226 Q210 244 215 260" stroke="#3d8688" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M260 226 Q270 244 265 260" stroke="#3d8688" stroke-width="12" stroke-linecap="round" fill="none"/>
    <circle cx="215" cy="264" r="7" fill="#f4d2a4"/>
    <circle cx="265" cy="264" r="7" fill="#f4d2a4"/>
  </g>

  <!-- floating notes / books -->
  <g transform="translate(348 140) rotate(15)">
    <rect width="54" height="38" rx="3" fill="#fafaf7" stroke="#0a1628" stroke-width="1.5"/>
    <line x1="6" y1="11" x2="48" y2="11" stroke="#7fbcbc" stroke-width="1.2"/>
    <line x1="6" y1="18" x2="40" y2="18" stroke="#94a3b8" stroke-width="1"/>
    <line x1="6" y1="24" x2="44" y2="24" stroke="#94a3b8" stroke-width="1"/>
    <line x1="6" y1="30" x2="34" y2="30" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <g transform="translate(72 156) rotate(-10)">
    <rect width="44" height="44" rx="6" fill="#3d8688"/>
    <circle cx="22" cy="15" r="4" fill="#fafaf7"/>
    <rect x="10" y="22" width="24" height="2.5" rx="1" fill="#fafaf7"/>
    <rect x="8" y="29" width="28" height="2.5" rx="1" fill="#fafaf7"/>
    <rect x="14" y="36" width="16" height="2.5" rx="1" fill="#fafaf7"/>
  </g>

  <!-- chart bubble -->
  <g transform="translate(386 200)">
    <circle r="22" fill="#fafaf7" stroke="#0a1628" stroke-width="1.5"/>
    <rect x="-12" y="2" width="4" height="10" fill="#3d8688"/>
    <rect x="-5" y="-3" width="4" height="15" fill="#3d8688"/>
    <rect x="2" y="-7" width="4" height="19" fill="#7fbcbc"/>
    <rect x="9" y="0" width="4" height="12" fill="#7fbcbc"/>
  </g>
</svg>
