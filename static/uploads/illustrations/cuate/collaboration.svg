<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" fill="none">
  <!-- background -->
  <circle cx="50" cy="60" r="4" fill="#7fbcbc" opacity="0.4"/>
  <circle cx="550" cy="60" r="4" fill="#7fbcbc" opacity="0.4"/>
  <circle cx="40" cy="300" r="3" fill="#3d8688"/>
  <circle cx="560" cy="300" r="3" fill="#3d8688"/>

  <!-- center shared workspace (a screen / dashboard between human and AI) -->
  <g transform="translate(300 180)">
    <rect x="-90" y="-60" width="180" height="120" rx="6" fill="#fafaf7" stroke="#0a1628" stroke-width="2"/>
    <rect x="-90" y="-60" width="180" height="20" rx="6" fill="#0a1628"/>
    <circle cx="-78" cy="-50" r="3" fill="#7fbcbc"/>
    <circle cx="-68" cy="-50" r="3" fill="#94a3b8"/>
    <circle cx="-58" cy="-50" r="3" fill="#94a3b8"/>
    <!-- dashboard content -->
    <rect x="-78" y="-28" width="48" height="6" rx="1" fill="#3d8688"/>
    <rect x="-78" y="-16" width="60" height="3" rx="1" fill="#94a3b8"/>
    <rect x="-78" y="-8" width="40" height="3" rx="1" fill="#94a3b8"/>
    <!-- mini chart -->
    <rect x="-78" y="10" width="6" height="20" fill="#3d8688"/>
    <rect x="-68" y="4" width="6" height="26" fill="#3d8688"/>
    <rect x="-58" y="14" width="6" height="16" fill="#7fbcbc"/>
    <rect x="-48" y="0" width="6" height="30" fill="#3d8688"/>
    <!-- right column: status -->
    <rect x="10" y="-28" width="60" height="3" rx="1" fill="#3d8688"/>
    <rect x="10" y="-20" width="48" height="3" rx="1" fill="#3d8688"/>
    <circle cx="14" cy="-10" r="3" fill="#3d8688"/>
    <rect x="22" y="-12" width="42" height="3" rx="1" fill="#94a3b8"/>
    <circle cx="14" cy="0" r="3" fill="#7fbcbc"/>
    <rect x="22" y="-2" width="38" height="3" rx="1" fill="#94a3b8"/>
    <circle cx="14" cy="10" r="3" fill="#94a3b8" stroke="#94a3b8"/>
    <rect x="22" y="8" width="34" height="3" rx="1" fill="#94a3b8"/>
  </g>

  <!-- human (left) -->
  <g transform="translate(140 180)">
    <rect x="-22" y="20" width="44" height="60" rx="6" fill="#486a8b"/>
    <circle cx="0" cy="0" r="22" fill="#f4d2a4"/>
    <path d="M-18 -4 Q0 -24 18 -4 L18 6 Q0 -14 -18 6 Z" fill="#1a2738"/>
    <circle cx="-7" cy="2" r="1.5" fill="#0a1628"/>
    <circle cx="7" cy="2" r="1.5" fill="#0a1628"/>
    <path d="M-6 10 Q0 14 6 10" stroke="#0a1628" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <!-- right arm reaching toward dashboard -->
    <path d="M22 38 Q60 30 90 0" stroke="#486a8b" stroke-width="12" stroke-linecap="round" fill="none"/>
    <circle cx="94" cy="-2" r="7" fill="#f4d2a4"/>
    <!-- label -->
    <text x="0" y="110" text-anchor="middle" fill="#0a1628" font-family="Inter, sans-serif" font-size="13" font-weight="500">Human</text>
    <text x="0" y="126" text-anchor="middle" fill="#525968" font-family="Inter, sans-serif" font-size="11">Judgement &amp; oversight</text>
  </g>

  <!-- AI (right) — represented as a friendly geometric entity -->
  <g transform="translate(460 180)">
    <!-- body: rounded square -->
    <rect x="-26" y="-22" width="52" height="56" rx="10" fill="#3d8688"/>
    <!-- eyes -->
    <circle cx="-9" cy="-4" r="4" fill="#fafaf7"/>
    <circle cx="9" cy="-4" r="4" fill="#fafaf7"/>
    <circle cx="-9" cy="-4" r="1.8" fill="#0a1628"/>
    <circle cx="9" cy="-4" r="1.8" fill="#0a1628"/>
    <!-- mouth -->
    <path d="M-8 10 Q0 16 8 10" stroke="#fafaf7" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- antenna -->
    <line x1="0" y1="-22" x2="0" y2="-34" stroke="#3d8688" stroke-width="2"/>
    <circle cx="0" cy="-36" r="3" fill="#7fbcbc"/>
    <!-- arm reaching toward dashboard -->
    <path d="M-26 14 Q-60 10 -90 -2" stroke="#3d8688" stroke-width="12" stroke-linecap="round" fill="none"/>
    <circle cx="-94" cy="-4" r="7" fill="#3d8688"/>
    <!-- legs -->
    <rect x="-16" y="34" width="10" height="22" rx="3" fill="#3d8688"/>
    <rect x="6" y="34" width="10" height="22" rx="3" fill="#3d8688"/>
    <!-- label -->
    <text x="0" y="92" text-anchor="middle" fill="#0a1628" font-family="Inter, sans-serif" font-size="13" font-weight="500">AI</text>
    <text x="0" y="108" text-anchor="middle" fill="#525968" font-family="Inter, sans-serif" font-size="11">Execution &amp; monitoring</text>
  </g>

  <!-- connecting lines suggesting collaboration -->
  <line x1="240" y1="170" x2="260" y2="165" stroke="#3d8688" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="340" y1="165" x2="360" y2="170" stroke="#3d8688" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
</svg>
