<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" fill="none">
  <!-- background dots -->
  <circle cx="60" cy="60" r="4" fill="#dee5ee"/>
  <circle cx="540" cy="60" r="4" fill="#eff7f7"/>
  <circle cx="80" cy="320" r="3" fill="#7fbcbc"/>
  <circle cx="520" cy="320" r="3" fill="#3d8688"/>

  <!-- left: traditional / old way — paper stack + clipboard -->
  <g transform="translate(80 100)">
    <!-- paper stack -->
    <g>
      <rect x="20" y="40" width="100" height="120" rx="3" fill="#fafaf7" stroke="#94a3b8" stroke-width="1.5"/>
      <rect x="14" y="34" width="100" height="120" rx="3" fill="#fafaf7" stroke="#94a3b8" stroke-width="1.5"/>
      <rect x="8" y="28" width="100" height="120" rx="3" fill="#fafaf7" stroke="#0a1628" stroke-width="1.5"/>
      <line x1="20" y1="50" x2="96" y2="50" stroke="#94a3b8" stroke-width="1"/>
      <line x1="20" y1="60" x2="88" y2="60" stroke="#94a3b8" stroke-width="1"/>
      <line x1="20" y1="70" x2="92" y2="70" stroke="#94a3b8" stroke-width="1"/>
      <line x1="20" y1="80" x2="84" y2="80" stroke="#94a3b8" stroke-width="1"/>
      <line x1="20" y1="90" x2="96" y2="90" stroke="#94a3b8" stroke-width="1"/>
      <line x1="20" y1="100" x2="80" y2="100" stroke="#94a3b8" stroke-width="1"/>
      <line x1="20" y1="110" x2="88" y2="110" stroke="#94a3b8" stroke-width="1"/>
      <line x1="20" y1="120" x2="92" y2="120" stroke="#94a3b8" stroke-width="1"/>
      <line x1="20" y1="130" x2="74" y2="130" stroke="#94a3b8" stroke-width="1"/>
    </g>
    <!-- magnifier on top suggesting manual review -->
    <g transform="translate(60 100)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#0a1628" stroke-width="3"/>
      <circle cx="0" cy="0" r="14" fill="#eff7f7" opacity="0.5"/>
      <line x1="13" y1="13" x2="28" y2="28" stroke="#0a1628" stroke-width="4" stroke-linecap="round"/>
    </g>
    <!-- caption -->
    <text x="60" y="200" text-anchor="middle" fill="#525968" font-family="Inter, sans-serif" font-size="14" font-weight="500">Manual</text>
    <text x="60" y="220" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="12" font-style="italic">spreadsheet-driven</text>
  </g>

  <!-- middle arrow -->
  <g transform="translate(260 170)">
    <path d="M0 10 L80 10" stroke="#3d8688" stroke-width="2" stroke-linecap="round"/>
    <path d="M70 4 L80 10 L70 16" stroke="#3d8688" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- subtle dotted continuation -->
    <line x1="0" y1="-12" x2="80" y2="-12" stroke="#7fbcbc" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
    <line x1="0" y1="32" x2="80" y2="32" stroke="#7fbcbc" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  </g>

  <!-- right: AI-orchestrated — laptop + AI cloud + workflow nodes -->
  <g transform="translate(380 100)">
    <!-- laptop -->
    <rect x="10" y="100" width="120" height="76" rx="4" fill="#0a1628"/>
    <rect x="15" y="105" width="110" height="62" rx="2" fill="#3d8688"/>
    <!-- screen content: AI face + nodes -->
    <circle cx="40" cy="130" r="8" fill="#7fbcbc"/>
    <circle cx="38" cy="128" r="1.5" fill="#0a1628"/>
    <circle cx="42" cy="128" r="1.5" fill="#0a1628"/>
    <path d="M37 134 Q40 136 43 134" stroke="#0a1628" stroke-width="1" stroke-linecap="round" fill="none"/>
    <!-- nodes on screen -->
    <circle cx="80" cy="120" r="3" fill="#fafaf7"/>
    <circle cx="100" cy="135" r="3" fill="#fafaf7"/>
    <circle cx="80" cy="150" r="3" fill="#fafaf7"/>
    <line x1="50" y1="130" x2="77" y2="121" stroke="#fafaf7" stroke-width="0.8"/>
    <line x1="50" y1="132" x2="97" y2="135" stroke="#fafaf7" stroke-width="0.8"/>
    <line x1="50" y1="134" x2="77" y2="149" stroke="#fafaf7" stroke-width="0.8"/>
    <!-- laptop base -->
    <rect x="0" y="174" width="140" height="6" rx="2" fill="#0a1628"/>
    <!-- AI cloud above laptop -->
    <g transform="translate(80 50)">
      <ellipse cx="0" cy="0" rx="40" ry="22" fill="#eff7f7" stroke="#3d8688" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" fill="#3d8688" font-family="ui-monospace, monospace" font-size="12" font-weight="700">AI</text>
      <!-- connector dots from cloud to laptop -->
      <circle cx="-8" cy="20" r="2" fill="#3d8688"/>
      <circle cx="0" cy="30" r="2" fill="#3d8688"/>
      <circle cx="8" cy="40" r="2" fill="#3d8688"/>
    </g>
    <!-- caption -->
    <text x="70" y="200" text-anchor="middle" fill="#1a2738" font-family="Inter, sans-serif" font-size="14" font-weight="500">AI-orchestrated</text>
    <text x="70" y="220" text-anchor="middle" fill="#525968" font-family="Inter, sans-serif" font-size="12" font-style="italic">workflow-driven</text>
  </g>
</svg>
