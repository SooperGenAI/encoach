<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" fill="none">
  <!-- background decoration -->
  <circle cx="50" cy="50" r="3" fill="#3d8688"/>
  <circle cx="550" cy="60" r="3" fill="#3d8688"/>
  <circle cx="30" cy="300" r="4" fill="#dee5ee"/>
  <circle cx="570" cy="280" r="4" fill="#dee5ee"/>

  <!-- dashed connecting path -->
  <path d="M 100 250 Q 300 80 500 250" stroke="#7fbcbc" stroke-width="2" stroke-dasharray="6 6" fill="none"/>

  <!-- milestone 1: AI familiarisation -->
  <g transform="translate(100 250)">
    <circle cx="0" cy="0" r="56" fill="#eff7f7" stroke="#3d8688" stroke-width="2"/>
    <!-- brain/neural icon -->
    <g transform="translate(0 -4)">
      <circle cx="-12" cy="-10" r="4" fill="#3d8688"/>
      <circle cx="12" cy="-10" r="4" fill="#3d8688"/>
      <circle cx="0" cy="0" r="4" fill="#3d8688"/>
      <circle cx="-14" cy="12" r="4" fill="#3d8688"/>
      <circle cx="14" cy="12" r="4" fill="#3d8688"/>
      <line x1="-12" y1="-10" x2="0" y2="0" stroke="#3d8688" stroke-width="1.5"/>
      <line x1="12" y1="-10" x2="0" y2="0" stroke="#3d8688" stroke-width="1.5"/>
      <line x1="-12" y1="-10" x2="-14" y2="12" stroke="#3d8688" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="-14" y2="12" stroke="#3d8688" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="14" y2="12" stroke="#3d8688" stroke-width="1.5"/>
      <line x1="12" y1="-10" x2="14" y2="12" stroke="#3d8688" stroke-width="1.5"/>
    </g>
    <!-- numeral above -->
    <text x="0" y="-70" text-anchor="middle" fill="#3d8688" font-family="ui-monospace, monospace" font-size="11" font-weight="700">01</text>
    <!-- label below -->
    <text x="0" y="84" text-anchor="middle" fill="#0a1628" font-family="Inter, sans-serif" font-size="14" font-weight="500">AI familiarisation</text>
    <text x="0" y="102" text-anchor="middle" fill="#525968" font-family="Inter, sans-serif" font-size="12">Operational fluency</text>
  </g>

  <!-- milestone 2: workflow training -->
  <g transform="translate(300 130)">
    <circle cx="0" cy="0" r="56" fill="#eff7f7" stroke="#3d8688" stroke-width="2"/>
    <!-- workflow / steps icon -->
    <g>
      <rect x="-22" y="-12" width="26" height="6" rx="1" fill="#3d8688"/>
      <rect x="-14" y="-2" width="30" height="6" rx="1" fill="#3d8688"/>
      <rect x="-6" y="8" width="26" height="6" rx="1" fill="#7fbcbc"/>
      <circle cx="-26" cy="-9" r="3" fill="#0a1628"/>
      <circle cx="-18" cy="1" r="3" fill="#0a1628"/>
      <circle cx="-10" cy="11" r="3" fill="#0a1628"/>
    </g>
    <text x="0" y="-70" text-anchor="middle" fill="#3d8688" font-family="ui-monospace, monospace" font-size="11" font-weight="700">02</text>
    <text x="0" y="84" text-anchor="middle" fill="#0a1628" font-family="Inter, sans-serif" font-size="14" font-weight="500">Workflow training</text>
    <text x="0" y="102" text-anchor="middle" fill="#525968" font-family="Inter, sans-serif" font-size="12">Operational practice</text>
  </g>

  <!-- milestone 3: corporate internships -->
  <g transform="translate(500 250)">
    <circle cx="0" cy="0" r="56" fill="#eff7f7" stroke="#3d8688" stroke-width="2"/>
    <!-- building / enterprise icon -->
    <g>
      <rect x="-18" y="-16" width="36" height="30" fill="none" stroke="#3d8688" stroke-width="2"/>
      <line x1="-18" y1="-4" x2="18" y2="-4" stroke="#3d8688" stroke-width="1.5"/>
      <line x1="-9" y1="-16" x2="-9" y2="14" stroke="#3d8688" stroke-width="1.5"/>
      <line x1="0" y1="-16" x2="0" y2="14" stroke="#3d8688" stroke-width="1.5"/>
      <line x1="9" y1="-16" x2="9" y2="14" stroke="#3d8688" stroke-width="1.5"/>
      <circle cx="0" cy="18" r="2.5" fill="#3d8688"/>
    </g>
    <text x="0" y="-70" text-anchor="middle" fill="#3d8688" font-family="ui-monospace, monospace" font-size="11" font-weight="700">03</text>
    <text x="0" y="84" text-anchor="middle" fill="#0a1628" font-family="Inter, sans-serif" font-size="14" font-weight="500">Corporate internships</text>
    <text x="0" y="102" text-anchor="middle" fill="#525968" font-family="Inter, sans-serif" font-size="12">Operational readiness</text>
  </g>

  <!-- start / end markers -->
  <circle cx="40" cy="320" r="4" fill="#94a3b8"/>
  <text x="40" y="346" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11" font-style="italic">Student</text>

  <circle cx="560" cy="320" r="4" fill="#3d8688"/>
  <text x="560" y="346" text-anchor="middle" fill="#3d8688" font-family="Inter, sans-serif" font-size="11" font-style="italic">Operationally ready</text>
</svg>
